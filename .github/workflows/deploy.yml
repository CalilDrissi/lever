name: Deploy to GitHub Pages

# Triggers:
#   - any push to main rebuilds and republishes
#   - manual run via the Actions tab
on:
  push:
    branches: [main]
  workflow_dispatch:

# GitHub Pages requires these scopes for the official deploy action.
permissions:
  contents: read
  pages: write
  id-token: write

# Don't run multiple deploys at once; cancel any in-flight ones if a new
# commit lands while a build is still running.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        # GITHUB_PAGES=true flips next.config.mjs into basePath="/lever"
        # mode and writes the static site to ./out/.
        env:
          GITHUB_PAGES: "true"
        run: npm run build

      - name: Disable Jekyll
        # GitHub Pages otherwise tries to run Jekyll, which strips files
        # whose names start with an underscore (Next emits _next/...).
        run: touch ./out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
